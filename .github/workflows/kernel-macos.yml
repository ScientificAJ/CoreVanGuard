name: Kernel macOS

on:
  push:
    paths:
      - "kernel/macos/**"
      - "scripts/build-macos-es.sh"
      - ".github/workflows/kernel-macos.yml"
  pull_request:
    paths:
      - "kernel/macos/**"
      - "scripts/build-macos-es.sh"
      - ".github/workflows/kernel-macos.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-endpoint-security:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Compile Endpoint Security target
        run: bash scripts/build-macos-es.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: corevanguard-macos-es
          path: kernel/macos/out/
